name: stm32 port

on:
  push:
  pull_request:  
    paths:
      - '.github/workflows/*.yml'
      - 'tools/**'
      - 'py/**'
      - 'extmod/**'
      - 'shared/**'
      - 'lib/**'
      - 'drivers/**'
      - 'ports/stm32/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_stm32:
    strategy:
      fail-fast: false
      matrix:
        ci_func:  # names are functions in ci.sh
          - stm32_pyb_build
          - stm32_nucleo_build
          - stm32_misc_build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive' # 強制抓取完整的 ST 晶片庫
          
      - name: Install packages
        run: tools/ci.sh stm32_setup && tools/ci.sh stm32_path >> $GITHUB_PATH

      - name: Build My Custom H7A3 Board
        run: |
          # 1. 進入 mpy-cross 編譯 MicroPython 核心交叉編譯器
          make -C mpy-cross
          
          # 2. 進入 stm32 目錄先抓取 submodules 地基
          make -C ports/stm32 submodules
          
          # 3. 指定只編譯我們的 H7A3 晶片（不要跑官方可能內含清理機制的 ci.sh）
          make -C ports/stm32 BOARD=NUCLEO_H7A3ZI_Q

      - name: Force Upload My STM32H7A3 Firmware
        if: always() # 強制無論如何都要撈檔案
        uses: actions/upload-artifact@v4
        with:
          name: my-stm32h7a3-firmware-${{ matrix.ci_func }}
          path: |
            ports/stm32/build-NUCLEO_H7A3ZI_Q/firmware.*

            
