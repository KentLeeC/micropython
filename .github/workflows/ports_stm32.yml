name: stm32 port

on:
  push:
  pull_request:  
    paths:
      - '.github/workflows/*.yml'
      - 'tools/**'
      - 'py/**'
      - 'extmod/**'
      - 'shared/**'
      - 'lib/**'
      - 'drivers/**'
      - 'ports/stm32/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_stm32:
    strategy:
      fail-fast: false
      matrix:
        ci_func:  # names are functions in ci.sh
          - stm32_pyb_build
          - stm32_nucleo_build
          - stm32_misc_build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install packages
        run: tools/ci.sh stm32_setup && tools/ci.sh stm32_path >> $GITHUB_PATH
      - name: Build with Official Script and My Custom Board
        run: |
          # 1. 先跑官方原本的編譯，把所有環境、QSTR、工具鏈全部初始化建立好
          tools/ci.sh ${{ matrix.ci_func }}
          
          # 2. 當環境被官方腳本初始化完畢後，我們趁機塞入我們的主角 H7A3
          # 這裡加一個 if 判斷，只讓 nucleo 那組伺服器順便幫我們編譯 H7A3，省時又不會亂套
          if [ "${{ matrix.ci_func }}" = "stm32_nucleo_build" ]; then
            make -C ports/stm32 BOARD=NUCLEO_H7A3ZI_Q
          fi
      - name: Force Upload My STM32H7A3 Firmware
        uses: actions/upload-artifact@v4
        with:
          name: my-stm32h7a3-firmware-${{ matrix.ci_func }}
          path: |
            ports/stm32/build-NUCLEO_H7A3ZI_Q/firmware.*
