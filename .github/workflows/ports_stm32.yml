name: stm32 port

on:
  push:
  pull_request:  
    paths:
      - '.github/workflows/*.yml'
      - 'tools/**'
      - 'py/**'
      - 'extmod/**'
      - 'shared/**'
      - 'lib/**'
      - 'drivers/**'
      - 'ports/stm32/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_stm32:
    strategy:
      fail-fast: false
      matrix:
        ci_func:  # names are functions in ci.sh
          - stm32_pyb_build
          - stm32_nucleo_build
          - stm32_misc_build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install packages
        run: tools/ci.sh stm32_setup && tools/ci.sh stm32_path >> $GITHUB_PATH
      - name: Build with Official Script and My Custom Board
        # continue-on-error 代表就算官方腳本最後卡住噴錯，也不要卡死，繼續往下走！
        continue-on-error: true 
        run: |
          tools/ci.sh ${{ matrix.ci_func }}
          if [ "${{ matrix.ci_func }}" = "stm32_nucleo_build" ]; then
            make -C ports/stm32 BOARD=NUCLEO_H7A3ZI_Q
          fi
      - name: Force Upload My STM32H7A3 Firmware
        # uses: actions/upload-artifact@v4 必須在前面的步驟結束後執行
        if: always() # 強迫這一步「無論如何（不管前面成功或失敗）」都必須執行！
        uses: actions/upload-artifact@v4
        with:
          name: my-stm32h7a3-firmware-${{ matrix.ci_func }}
          path: |
            ports/stm32/build-NUCLEO_H7A3ZI_Q/firmware.*

            
