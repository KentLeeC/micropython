name: stm32 port

on:
  push:
  pull_request:
    paths:
      - '.github/workflows/*.yml'
      - 'tools/**'
      - 'py/**'
      - 'extmod/**'
      - 'shared/**'
      - 'lib/**'
      - 'drivers/**'
      - 'ports/stm32/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_stm32:
    strategy:
      fail-fast: false
      matrix:
        ci_func:
          - stm32_pyb_build
          - stm32_nucleo_build
          - stm32_misc_build
          # 👉 密技：直接在矩陣裡加一格我們專屬的 Job 名字！
          - my_custom_h7a3_build

    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Install packages
        # 如果是我們自己的 Job，我們借用 stm32_nucleo_build 的環境設定來裝 ARM 工具鏈
        run: |
          if [ "${{ matrix.ci_func }}" = "my_custom_h7a3_build" ]; then
            tools/ci.sh stm32_setup && tools/ci.sh stm32_path >> $GITHUB_PATH
          else
            tools/ci.sh stm32_setup && tools/ci.sh stm32_path >> $GITHUB_PATH
          fi

      - name: Build Firmware
        run: |
          if [ "${{ matrix.ci_func }}" = "my_custom_h7a3_build" ]; then
            # Fix: mpconfigboard_common.h unconditionally defines I2S=0,
            # but NUCLEO_H7A3ZI_Q/mpconfigboard.h already sets it to 1.
            # Wrap with #ifndef to let board config win.
            sed -i \
              's/#define MICROPY_PY_MACHINE_I2S (0)/#ifndef MICROPY_PY_MACHINE_I2S\n#define MICROPY_PY_MACHINE_I2S (0)\n#endif/' \
              ports/stm32/mpconfigboard_common.h

            make -C mpy-cross
            make -C ports/stm32 BOARD=NUCLEO_H7A3ZI_Q submodules
            make -j$(nproc) -C ports/stm32 BOARD=NUCLEO_H7A3ZI_Q
          else
            tools/ci.sh ${{ matrix.ci_func }}
          fi

      - name: Force Upload My STM32H7A3 Firmware
        if: matrix.ci_func == 'my_custom_h7a3_build'
        uses: actions/upload-artifact@v4
        with:
          name: my-stm32h7a3-firmware
          path: |
            ports/stm32/build-NUCLEO_H7A3ZI_Q/firmware.*
