name: stm32 port

on:
  push:
  pull_request:  
    paths:
      - '.github/workflows/*.yml'
      - 'tools/**'
      - 'py/**'
      - 'extmod/**'
      - 'shared/**'
      - 'lib/**'
      - 'drivers/**'
      - 'ports/stm32/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_stm32:
    strategy:
      fail-fast: false
      matrix:
        ci_func:  # names are functions in ci.sh
          - stm32_pyb_build
          - stm32_nucleo_build
          - stm32_misc_build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
      - name: Install packages
        run: tools/ci.sh stm32_setup && tools/ci.sh stm32_path >> $GITHUB_PATH
      - name: Build My Custom H7A3 Board
        run: |
          make -C mpy-cross
          make -C ports/stm32 BOARD=NUCLEO_H7A3ZI_Q
      - name: Force Upload My STM32H7A3 Firmware
        uses: actions/upload-artifact@v4
        with:
          name: my-stm32h7a3-firmware
          path: |
            ports/stm32/build-NUCLEO_H7A3ZI_Q/firmware.*

